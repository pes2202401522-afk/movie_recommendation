<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url("https://assets.nflxext.com/ffe/siteui/vlv3/bg.jpg") no-repeat center center/cover;
        }

        .overlay {
            background: rgba(0,0,0,0.7);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: rgba(0,0,0,0.8);
            padding: 40px;
            border-radius: 8px;
            color: white;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #333;
            border: none;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            background: red;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        a {
            color: #aaa;
        }
    </style>
</head>

<body>
<div class="overlay">
    <div class="login-box">
        <h2>Sign In</h2>

        <form action="/login" method="post">
            <input type="email" name="email" placeholder="Email">
            <input type="password" name="password" placeholder="Password">
            <button type="submit">Sign In</button>
        </form>

        <p th:text="${error}" style="color:red;"></p>

        <p>New to Netflix? <a href="/register">Sign up now</a></p>
    </div>
</div>
</body>
</html>
